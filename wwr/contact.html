<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact Us Aqua Vibe Riders</title>
        <meta name="description"
          content="Looking for an adventure? Call us now here in Aqua Vibe Riders">
        <meta name="author" content="Jade Aurora Torres">
        <link rel="stylesheet" href="styles/rafting.css">
    </head>

    <body>
        <header class="grid">
            <div>
                <img src="images/rapids.jpg" alt="Experience the Thrill" width="150" height="120">
            </div>
            <div>
                <nav class="flex">
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="about.html">About Us</a></li>
                        <li><a href="trips.html">Trips</a></li>
                        <li><a href="contact.html">Contact Us</a></li>
                    </ul>
                </nav>
            </div>
        </header>

        <main>
            <section class="contact-detail">
                <div>
                    <h1>Aqua Vibe Riders</h1>
                </div>
                <div>
                    <p>Block 6 Lot 92 Santorini Estates, <br>Calumpang, Binangonan, Rizal
                        <br>0998-551-9016<br>info@aquaviberiders.com
                    </p>
                </div>
            </section>
            <section class="grid-map-form">
                <div>
                    <iframe
                      src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d42959.565208413565!2d124.64115588464357!3d8.480129400024936!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sph!4v1775609832059!5m2!1sen!2sph"
                      allowfullscreen="" loading="lazy"
                      referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
                <div>
                    <form action="/submit" method="post">
                        <table>
                            <tr>
                                <td><label for="fname">Name</label></td>
                                <td><input type="text" id="fname" name="fname"></td>
                            </tr>
                            <tr>
                                <td><label for="email">Email</label></td>
                                <td><input type="text" id="email" name="email"></td>
                            </tr>
                            <tr>
                                <td><label for="purpose" id="purpose" name="purpose">Message<br>
                                        Purpose</label></td>
                                <td>
                                    <input type="radio" id="gen-enquiry" name="purpose"
                                      value="gen-enquiry"><label for="gen-enquiry">General
                                        Enquiry</label><br><br>
                                    <input type="radio" id="reservation" name="purpose"
                                      value="reservation"><label for="reservation">Reservation
                                        Question</label><br><br>
                                    <input type="radio" id="suggestion" name="purpose"
                                      value="suggestion"><label for="suggestion">Website
                                        Suggestion</label>
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2">
                                    <label for="feedback">Message</label><br>
                                    <textarea id="feedback" name="feedback"
                                      placeholder="Type here"></textarea>
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2">
                                    <input type="checkbox" id="subscribe" name="subscribe">
                                    <label for="subscribe">Please Subscribe me to the monthly
                                        newsletter</label>
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2"><button type="submit">Get in Touch!</button></td>
                            </tr>
                        </table>
                    </form>
                </div>
            </section>

            <section class="employee-grid">
                <div class="employee-3">
                    <h2>We Are Here To Serve You</h2>
                </div>
                <figure class="emp-three">
                    <img src="images/manager.png">
                    <figcaption>Manager</figcaption>
                </figure>
                <figure class="emp-three">
                    <img src="images/instructor.png">
                    <figcaption>Rafting Instructor</figcaption>
                </figure>
                <figure class="emp-three">
                    <img src="images/supervisor.png">
                    <figcaption>Logistic Supervisor</figcaption>
                </figure>
            </section>

        </main>

        <footer class="footer-grid">
            <div>
                <p>©️2026 | Aqua Vibe Rider | Jade Torres</p>
            </div>
            <div>
                <nav class="socialmedia">
                    <a class="five" href="https://facebook.com">
                        <img src="images/facebook_icon2_2.png" alt="Facebook Icon">
                    </a>
                    <a href="https://www.instagram.com/">
                        <img src="images/instagram_icon_2_2.png" alt="Instagram Icon">
                    </a>
                    <a href="https://x.com">
                        <img src="images/x_twitter_2.png" alt="X formerly Twitter Icon">
                    </a>
                </nav>
            </div>
        </footer>

    </body>

</html>
