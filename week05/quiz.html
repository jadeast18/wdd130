<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Basic HTML and CSS Quiz</title>
        <link rel="stylesheet" href="styles/quiz.css">
    </head>

    <body>
        <!--<h1><header>
            <h1>✅ Basic HTML and CSS Quiz</h1>
        </header> -->

        <main>
            <h1>✅ Basic HTML and CSS Quiz</h1>
            <form>
                <div class="quiz-item">
                    <label for="acronym"><b>1. </b>What does the acronym CSS stand for?</label>
                    <input type="text" id="q1" name="q1">
                </div>
                <div class="quiz-item">
                    <label for="feedback"><b>2. </b>How are the id and class selected in
                        CSS?</label>
                    <textarea id="q2" name="q2" rows="5"></textarea>
                </div>
                <div class="quiz-item">
                    <label for="comment"><b>3. </b>Which of the following is a valid CSS
                        Comment?</label>
                    <select id="q3" name="q3">
                        <option value="" selected disabled>Choose One ...</option>
                        <option value="a">A. &lt;!-- This is a comment --&gt;</option>
                        <option value="b">B. /* This is a comment */</option>
                        <option value="3">C. // This is a comment</option>
                    </select>
                </div>
                <div class="quiz-item">
                    <label for="integernumber"><b>4. </b>What is the bottom margin given this
                        declaration?</label>
                    <code class="box">margin: 10px 5px 15px;</code>
                    <input type="number" id="number" name="number">
                </div>
                <button type="submit">Submit Quiz</button>
            </form>

        </main>

    </body>

</html>
