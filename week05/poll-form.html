<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WDD 130 | HTML Form - User Poll</title>
        <link rel="stylesheet" href="styles/poll-form.css">
    </head>

    <body>
        <header>
            <h1>W05 Learning Activity: HTML Forms</h1>
        </header>

        <main>
            <form>
                <h2>Contact Information</h2>
                <div class="form-item column2">
                    <label for="fullname">Full Name:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>

                <div class="form-item column2">
                    <label for="useremail">Email:</label>
                    <input type="email" id="useremail" name="useremail" required>
                </div>


                <h2>Questions</h2>
                <!-- 
                <label for="quantity">Select Quantity</label>            
                <select name="quantity" id="quantity">
                    <option value="1">One</option>
                    <option value="2">Two</option>
                    <option value="3">Three</option>
                </select> -->

                <div class="form-item column1">
                    <label for="browser">What is your favorite browser?</label>
                    <select name="browser" id="browser">
                        <option value="1">Chrome</option>
                        <option value="2">Safari</option>
                        <option value="3">Edge</option>
                    </select>
                </div>

                <div class="form-item column1">
                    <label for="pet">Do you have a household pet?</label>
                    <input type="checkbox" id="pet" name="pet">
                </div>

                <label for="feedback">List the places that you have lived?</label>
                <textarea id="feedback" name="feedback" rows="3"
                  placeholder="Cubao, Philippines"></textarea>

                <button type="submit">Submit Poll</button>
            </form>

        </main>


        <footer>


        </footer>


    </body>


</html>
